# ============================================================
# Inventory (MySQL) source DB — LCM schema
# ============================================================
LCM_DB_URL=jdbc:mariadb://mysql-platform-cluster.platformdb.svc.cluster.local:6446/LCM?autoReconnect=true&allowPublicKeyRetrieval=true&useSSL=false
DB_USER=LCM
DB_PASSWORD=lcm%lcm2
DB_DRIVER=org.mariadb.jdbc.Driver

# ============================================================
# JanusGraph — filesystem path or classpath resource name for the
# JanusGraph .properties file (defaults to topology.properties on
# the classpath). Override via TOPOLOGY_PROPERTIES env var.
# ============================================================
TOPOLOGY_PROPERTIES=topology.properties

# ============================================================
# Batching tuning (defaults mirror the topology service)
# ============================================================
JDBC_FETCH_SIZE=1000
VERTEX_BATCH_SIZE=5000
EDGE_BATCH_SIZE=2000

# ============================================================
# Stage toggles — disable a stage by setting to false.
# Mirrors the original three NiFi processors:
#   STAGE_LLDP_OSPF_*  ← ProcessorRailtelProduction3040
#   STAGE_ISIS_*       ← IsisProcessor3040
#   STAGE_SWITCH_*     ← SwitchProcessorRailtel
# ============================================================
STAGE_LLDP_OSPF_PARENT_VERTEX=true
STAGE_LLDP_OSPF_NEIGHBOUR_INTERFACE_LLDP=true
STAGE_LLDP_OSPF_CHILD_INTERFACE_LLDP=true
STAGE_LLDP_OSPF_NEIGHBOUR_INTERFACE_OSPF=true
STAGE_LLDP_OSPF_CHILD_INTERFACE_OSPF=true

STAGE_ISIS_PARENT_VERTEX=true
STAGE_ISIS_NEIGHBOUR_INTERFACE=true
STAGE_ISIS_CHILD_INTERFACE=true

STAGE_SWITCH_PARENT_VERTEX=true
STAGE_SWITCH_NEIGHBOUR_INTERFACE=true
STAGE_SWITCH_CHILD_INTERFACE=true

# ============================================================
# Misc
# ============================================================
# Stop the whole job if a single stage's batch fails (true) or
# continue with the next stage (false).
INGESTION_STOP_ON_STAGE_FAILURE=false